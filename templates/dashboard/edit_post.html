{% extends "base.html" %}
{% block content %}

<div class="row">
    {% load crispy_forms_tags %}
    <!-- left sidebar -->
     {% comment %} load sidebar {% endcomment %}
     {% include "dashboard/sidebar.html" %}
     <div class="col-md-9">
        <h2 >Edit Category</h2>
        <form action="{% url 'edit_post' post.id %}" method="POST" style="width:500px;" enctype="multipart/form-data">
            {% csrf_token %}
            {{form | crispy}}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        
       
     </div>


    <!-- right side content -->
</div>

{% endblock content %}
