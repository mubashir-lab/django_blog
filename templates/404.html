<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow:hidden;
}

.container{
    text-align:center;
}

.error-code{
    font-size:10rem;
    font-weight:bold;
    color:#38bdf8;
    text-shadow:0 0 20px rgba(56,189,248,0.8);
}

.message{
    font-size:1.8rem;
    margin-bottom:15px;
}

.description{
    color:#cbd5e1;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    background:#38bdf8;
    color:#0f172a;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:white;
    transform:translateY(-3px);
}

.rocket{
    position:absolute;
    font-size:60px;
    animation:fly 8s linear infinite;
}

@keyframes fly{
    0%{
        transform:translate(-200px,200px) rotate(0deg);
    }
    100%{
        transform:translate(calc(100vw + 200px),-200px) rotate(45deg);
    }
}
</style>
</head>
<body>

<div class="rocket">🚀</div>

<div class="container">
    <div class="error-code">404</div>
    <h2 class="message">Oops! Lost in Space</h2>
    <p class="description">
        The page you're looking for has drifted into another galaxy.
    </p>
    <a href="/" class="btn">Return Home</a>
</div>

</body>
</html>
